<!DOCTYPE html>
<html>

<head>
  <title>Blog | Charles Dobson</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles/css/blog.css" />
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.14/dist/lenis.css">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="styles/img/favicon32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="styles/img/favicon16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="styles/img/favicon180.png" />
</head>


<body>
  <header>
    <div id="navbar-load"></div>
    <div id="navbar-load"></div>
  </header>

  <main class="blog-main">
    <div class="page-heading">
      <div class="selector">
        <div class="segmented" role="group" aria-label="Blog sort">
          <span class="seg-indicator" aria-hidden="true"></span>
          <button type="button" data-sort="recent" aria-pressed="true">Most Recent</button>
          <button type="button" data-sort="oldest" aria-pressed="false">Oldest</button>
        </div>
      </div>

      <div class="page-title">
        <h1 class="page-title-text">Blog</h1>
        <div class="page-title-line"></div>
      </div>
    </div>

    <section class="list" id="blogList" aria-label="Blog posts"></section>
  </main>

  <section class="cta">
    <div class="hero-marquee">
      <div class="hero-marquee-inner">
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
        <p class="hero-marquee-text">Get In Touch &middot;</p>
      </div>
    </div>
    <div class="cta-text">
      <div class="cta-logo"></div>
      <p class="cta-head">Like something<br>you see?</p>
      <div class="navBar-button">
        <div class="navBar-button-inner">
          <div class="navBar-button-inner-line-left"></div>
          Contact Me
          <div class="navBar-button-inner-line-right"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-load"></div>

  <script src="js/loader.js" defer></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js" defer></script>
  <script src="js/blog.js" defer></script>
</body>

</html>
